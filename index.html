<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Phaser3 Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        /* 全局禁止长按菜单和文字选择 */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      body {
        position: relative;
      }
      /* Virtual D-Pad Styles */
      #dpad {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: grid;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(3, 48px);
        gap: 4px;
        z-index: 100;
      }
      #btn-up { grid-area: up; }
      #btn-left { grid-area: left; }
      #btn-down { grid-area: down; }
      #btn-right { grid-area: right; }
      #dpad button {
        width: 48px;
        height: 48px;
        background: rgba(255, 255, 255, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 8px;
        font-size: 20px;
        cursor: pointer;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        color: #fff;
      }
      #dpad button:active {
        background: rgba(255, 255, 255, 0.5);
      }
      /* Virtual A Button Styles */
      #btn-action {
        position: fixed;
        bottom: 68px;
        left: 20px;
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        font-family: 'Press Start 2P', cursive;
        font-size: 16px;
        color: #fff;
        cursor: pointer;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        z-index: 100;
      }
      #btn-action:active {
        background: rgba(255, 255, 255, 0.5);
      }
      /* Fullscreen overlay */
      #fullscreen-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: #fff;
        font-family: 'Press Start 2P', cursive;
        text-align: center;
        cursor: pointer;
      }
      #fullscreen-overlay.show { display: flex; }
      #fullscreen-overlay .title { font-size: 14px; margin-bottom: 20px; line-height: 1.8; }
      #fullscreen-overlay .hint { font-size: 10px; color: #aaa; line-height: 1.6; }
    </style>
  </head>
  <body>
    <!-- Fullscreen overlay for mobile -->
    <div id="fullscreen-overlay">
      <div class="title">点击屏幕开始游戏</div>
      <div class="hint">Tap to Start</div>
    </div>

    <!-- Virtual A Button for mobile/touch controls -->
    <button id="btn-action" aria-label="Action">A</button>

    <!-- Virtual D-Pad for mobile/touch controls -->
    <div id="dpad">
      <button id="btn-up" aria-label="Move up">&#9650;</button>
      <button id="btn-left" aria-label="Move left">&#9664;</button>
      <button id="btn-down" aria-label="Move down">&#9660;</button>
      <button id="btn-right" aria-label="Move right">&#9654;</button>
    </div>

    <script type="module" src="/src/main.ts"></script>

    <script>
      // 全局禁止 contextmenu（防止 Safari 长按弹出菜单）
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      // 移动端全屏处理
      (function() {
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        var overlay = document.getElementById('fullscreen-overlay');
        if (isMobile && overlay) {
          overlay.classList.add('show');
          overlay.addEventListener('pointerdown', function() {
            overlay.classList.remove('show');
            // 尝试请求全屏（Android Chrome 支持，iOS Safari 不支持）
            var el = document.documentElement;
            var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (rfs) {
              rfs.call(el).catch(function() {});
            }
          }, { once: true });
        }
      })();

      window.addEventListener('load', function() {
        // A Button binding
        const actionBtn = document.getElementById('btn-action');
        if (actionBtn) {
          actionBtn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (window.__gameInput && window.__gameInput.pressAction) {
              window.__gameInput.pressAction();
            }
          });
        }

        const bindings = [
          ['btn-up', 'up'],
          ['btn-down', 'down'],
          ['btn-left', 'left'],
          ['btn-right', 'right']
        ];

        bindings.forEach(function(binding) {
          const id = binding[0];
          const dir = binding[1];
          const btn = document.getElementById(id);

          if (!btn) return;

          btn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            if (window.__gameInput) window.__gameInput.pressKey(dir);
          });

          ['pointerup', 'pointerleave', 'pointercancel'].forEach(function(evt) {
            btn.addEventListener(evt, function(e) {
              e.preventDefault();
              if (window.__gameInput) window.__gameInput.releaseKey(dir);
            });
          });
        });
      });
    </script>
  </body>
</html>
